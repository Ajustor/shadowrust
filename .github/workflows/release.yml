name: Release

on:
  push:
    branches: [master]
    tags: ["v*"]

jobs:
  # Detect if Cargo.toml version changed (skipped on tag pushes)
  version-detect:
    if: "!startsWith(github.ref, 'refs/tags/')"
    uses: Ajustor/workflows/.github/workflows/cargo-version-detect.yml@master

  # Build & release for Linux
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    needs: [version-detect]
    if: |
      always() && (
        startsWith(github.ref, 'refs/tags/') ||
        needs.version-detect.outputs.changed == 'true'
      )
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libavcodec-dev libavformat-dev libavutil-dev \
            libavdevice-dev libswscale-dev \
            libclang-dev clang pkg-config \
            libv4l-dev libudev-dev \
            libvulkan-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release

      - name: Rename binary
        run: cp target/release/shadowrust shadowrust-linux-x86_64

      - uses: actions/upload-artifact@v4
        with:
          name: shadowrust-linux-x86_64
          path: shadowrust-linux-x86_64

  # Build & release for macOS
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    needs: [version-detect]
    if: |
      always() && (
        startsWith(github.ref, 'refs/tags/') ||
        needs.version-detect.outputs.changed == 'true'
      )
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: brew install ffmpeg llvm pkg-config

      - name: Set ffmpeg & LLVM environment (macOS)
        run: |
          FFMPEG_PREFIX=$(brew --prefix ffmpeg)
          LLVM_PREFIX=$(brew --prefix llvm)
          echo "PKG_CONFIG_PATH=${FFMPEG_PREFIX}/lib/pkgconfig" >> $GITHUB_ENV
          echo "LIBCLANG_PATH=${LLVM_PREFIX}/lib" >> $GITHUB_ENV
          echo "PATH=${LLVM_PREFIX}/bin:${PATH}" >> $GITHUB_ENV

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release

      - name: Rename binary
        run: cp target/release/shadowrust shadowrust-macos-aarch64

      - uses: actions/upload-artifact@v4
        with:
          name: shadowrust-macos-aarch64
          path: shadowrust-macos-aarch64

  # Build & release for Windows
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: [version-detect]
    if: |
      always() && (
        startsWith(github.ref, 'refs/tags/') ||
        needs.version-detect.outputs.changed == 'true'
      )
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM (for bindgen)
        run: choco install llvm --no-progress -y

      - name: Download pre-built ffmpeg (Windows)
        shell: pwsh
        run: |
          $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl-shared.zip"
          Invoke-WebRequest -Uri $url -OutFile ffmpeg.zip -UseBasicParsing
          Expand-Archive -Path ffmpeg.zip -DestinationPath ffmpeg-win -Force
          $ffmpegDir = (Get-ChildItem -Path ffmpeg-win -Directory | Select-Object -First 1).FullName
          Write-Host "FFMPEG_DIR set to: $ffmpegDir"
          "FFMPEG_DIR=$ffmpegDir" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "LIBCLANG_PATH=C:\Program Files\LLVM\lib" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release

      - name: Bundle ffmpeg DLLs
        run: |
          Copy-Item "$env:FFMPEG_DIR\bin\*.dll" target\release\

      - name: Package release
        run: |
          Compress-Archive -Path target\release\shadowrust.exe, target\release\*.dll -DestinationPath shadowrust-windows-x86_64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: shadowrust-windows-x86_64
          path: shadowrust-windows-x86_64.zip

  # Create GitHub release with all artifacts
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [build-linux, build-macos, build-windows]
    if: |
      always() &&
      needs.build-linux.result == 'success' &&
      needs.build-macos.result == 'success' &&
      needs.build-windows.result == 'success'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*= *"\(.*\)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('v{0}', steps.version.outputs.version) }}
          name: ShadowRust ${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          files: |
            artifacts/shadowrust-linux-x86_64/shadowrust-linux-x86_64
            artifacts/shadowrust-macos-aarch64/shadowrust-macos-aarch64
            artifacts/shadowrust-windows-x86_64/shadowrust-windows-x86_64.zip
