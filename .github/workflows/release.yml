name: Release

on:
  push:
    branches: [master]
    tags: ['v*']

jobs:
  # Detect if Cargo.toml version changed (skipped on tag pushes)
  version-detect:
    if: "!startsWith(github.ref, 'refs/tags/')"
    uses: Ajustor/workflows/.github/workflows/cargo-version-detect.yml@master

  # Build & release for Linux
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    needs: [version-detect]
    if: |
      always() && (
        startsWith(github.ref, 'refs/tags/') ||
        needs.version-detect.outputs.version_changed == 'true'
      )
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libavcodec-dev libavformat-dev libavutil-dev \
            libavdevice-dev libswscale-dev \
            libclang-dev clang pkg-config \
            libv4l-dev libudev-dev \
            libvulkan-dev \
            libasound2-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release

      - name: Rename binary
        run: cp target/release/shadowrust shadowrust-linux-x86_64

      - uses: actions/upload-artifact@v4
        with:
          name: shadowrust-linux-x86_64
          path: shadowrust-linux-x86_64

  # Build & release for Windows
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: [version-detect]
    if: |
      always() && (
        startsWith(github.ref, 'refs/tags/') ||
        needs.version-detect.outputs.version_changed == 'true'
      )
    steps:
      - uses: actions/checkout@v4

      - name: Download pre-built ffmpeg (Windows)
        shell: pwsh
        run: |
          $ProgressPreference = 'SilentlyContinue'
          $zip  = "$env:RUNNER_TEMP\ffmpeg.zip"
          $dest = "$env:RUNNER_TEMP\ffmpeg-extract"
          $ffmpegDir = "$env:RUNNER_TEMP\ffmpeg"

          Invoke-WebRequest `
            "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-n7.1-latest-win64-gpl-shared-7.1.zip" `
            -OutFile $zip -UseBasicParsing
          Expand-Archive -Path $zip -DestinationPath $dest -Force
          $inner = (Get-ChildItem -Path $dest -Directory | Select-Object -First 1).FullName
          Move-Item $inner $ffmpegDir

          # avfft.h was removed in FFmpeg 7.0; ffmpeg-sys-next still tries to bind it.
          # Create an empty stub so bindgen doesn't fail.
          $avfftDir = "$ffmpegDir\include\libavcodec"
          $avfftPath = "$avfftDir\avfft.h"
          if (-not (Test-Path $avfftPath)) {
            Set-Content $avfftPath "#ifndef AVCODEC_AVFFT_H`n#define AVCODEC_AVFFT_H`n#endif`n"
          }

          # LLVM/libclang is pre-installed on windows-latest at C:\Program Files\LLVM
          # libclang.dll lives in bin\, not lib\
          "FFMPEG_DIR=$ffmpegDir"                     >> $env:GITHUB_ENV
          "LIBCLANG_PATH=C:\Program Files\LLVM\bin"   >> $env:GITHUB_ENV

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release
        shell: pwsh
        run: cargo build --release

      - name: Package release
        shell: pwsh
        run: |
          $null = New-Item -ItemType Directory -Force -Path release\libs

          Copy-Item target\release\shadowrust.exe release\shadowrust.exe

          # Copy the FFmpeg DLLs needed for capture/recording into libs\
          $needed = @("avcodec", "avformat", "avutil", "swscale", "swresample")
          foreach ($dll in (Get-ChildItem "$env:FFMPEG_DIR\bin\*.dll")) {
            $base = $dll.BaseName -replace '-\d+$', ''
            if ($needed -contains $base) {
              Copy-Item $dll.FullName release\libs\
            }
          }

          Compress-Archive -Path release\* -DestinationPath shadowrust-windows-x86_64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: shadowrust-windows-x86_64
          path: shadowrust-windows-x86_64.zip

  # Create GitHub release with all artifacts
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows]
    if: |
      always() &&
      needs.build-linux.result == 'success' &&
      needs.build-windows.result == 'success'
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*= *"\(.*\)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('v{0}', steps.version.outputs.version) }}
          name: ShadowRust ${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          files: |
            artifacts/shadowrust-linux-x86_64/shadowrust-linux-x86_64
            artifacts/shadowrust-windows-x86_64/shadowrust-windows-x86_64.zip

  # Deploy download page to GitHub Pages
  deploy-pages:
    name: Deploy Download Page
    needs: [release]
    if: needs.release.result == 'success'
    uses: Ajustor/workflows/.github/workflows/pages-deploy.yml@master
    with:
      package_name: ShadowRust
      version: ${{ needs.release.outputs.version }}
      is_repo_public: false
    permissions:
      contents: write
      pages: write
      id-token: write
